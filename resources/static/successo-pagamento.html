<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Riuscito - CineStore</title>
    <link rel="stylesheet" href="css/successo-pagamento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div class="ambient-light"></div>

        <div class="success-card">
            
            <div class="hero-icon-container">
                <div class="glow-ring"></div>
                <i class="fas fa-clapperboard main-icon"></i>
                <div class="badge-check">
                    <i class="fas fa-check"></i>
                </div>
            </div>

            <div class="content-text">
                <h1>Tutto pronto per la visione!</h1>
                <p class="lead-text">Il pagamento è andato a buon fine.</p>
                <p class="description">
                    I contenuti acquistati sono stati sbloccati e aggiunti con successo alla tua collezione personale. Puoi iniziare la riproduzione quando vuoi.
                </p>
            </div>

            <div class="cinema-divider">
                <span><i class="fas fa-star"></i></span>
            </div>

            <div class="action-buttons">
                <a href="#" class="btn btn-play">
                    <i class="fas fa-play"></i> Vai alla mia Libreria
                </a>
                <a href="catalogo.html" class="btn btn-home">
                    Continua lo Shopping
                </a>
            </div>

        </div>
    </div>

</body>
</html>
